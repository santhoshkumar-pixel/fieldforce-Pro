# Spring Boot Server Port
server.port=8080

# Supabase PostgreSQL Database Connection Settings
# By default, falls back to a local PostgreSQL database, but can be overridden
# easily with environment variables: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.ncwfqhqyperohjnplgvt}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:recykal@123!}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA and Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Database Initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=file:db/schema.sql
spring.sql.init.data-locations=file:db/data.sql

# Logging configuration
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO

# File upload limits
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

